<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex - Fetch API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="container py-4">
    <h1 class="mb-2">Pokédex</h1>
    <p class="text-muted mb-4">Ejemplo de consulta a PokeAPI usando Fetch API</p>

    <div class="mb-3 d-flex gap-2">
        <input type="number" id="pokemonCount" class="form-control" style="max-width: 120px;"
            min="1" max="50" value="12" aria-label="Cantidad de pokémon a cargar">
        <button id="loadBtn" class="btn btn-primary">Cargar Pokémon</button>
    </div>

    <div id="loading" class="text-center my-4">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Cargando...</span>
        </div>
    </div>

    <div id="pokemons" class="row g-3"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="js/main.js"></script>
</body>

</html>
