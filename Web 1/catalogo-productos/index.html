<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo de Productos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <h1 class="text-center mb-4">Crear Producto</h1>

    <div class="row justify-content-center mb-5">
      <div class="col-md-6">
        <div class="card p-4 shadow-sm">
          <div class="mb-3">
            <label for="nombre" class="form-label">Nombre del producto</label>
            <input type="text" class="form-control" id="nombre" placeholder="Ej: Laptop">
          </div>
          <div class="mb-3">
            <label for="precio" class="form-label">Precio del producto</label>
            <input type="number" class="form-control" id="precio" placeholder="Ej: 999.99" min="0" step="0.01">
          </div>
          <div class="mb-3">
            <label for="imagen" class="form-label">URL de imagen del producto</label>
            <input type="url" class="form-control" id="imagen" placeholder="https://ejemplo.com/imagen.jpg">
          </div>
          <button class="btn btn-primary w-100" onclick="crearProducto()">Crear Producto</button>
        </div>
      </div>
    </div>

    <h2 class="text-center mb-3">Productos</h2>
    <div class="row g-4" id="productos"></div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
